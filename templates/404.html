{% extends "base.html" %}
{% block title %}404 — Página no encontrada | Enterprise Report Tool{% endblock %}

{% block content %}
<div style="min-height:60vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 20px;">
  <div style="font-size:5rem; font-weight:900; font-family:var(--font-head); color:var(--border-strong); line-height:1; margin-bottom:8px;">
    404
  </div>
  <div style="width:60px; height:4px; background:linear-gradient(135deg, var(--orange), var(--orange-light)); border-radius:2px; margin:0 auto 24px;"></div>
  <h2 style="font-family:var(--font-head); font-size:1.3rem; color:var(--text); margin-bottom:8px;">
    Página no encontrada
  </h2>
  <p style="color:var(--text-3); font-size:0.875rem; max-width:360px; margin-bottom:32px; line-height:1.6;">
    La página que buscás no existe o fue movida. Volvé al dashboard para continuar.
  </p>
  <a href="{{ url_for('dashboard') }}" class="btn-modern btn-primary-modern">
    <i class="fas fa-home"></i> Ir al Dashboard
  </a>
</div>
{% endblock %}
